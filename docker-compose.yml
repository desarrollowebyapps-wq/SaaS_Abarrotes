services:
  postgres:
    image: postgres:15-alpine
    container_name: saas_abarrotes_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: saas_user
      POSTGRES_PASSWORD: saas_pass
      POSTGRES_DB: saas_abarrotes
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U saas_user -d saas_abarrotes"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
